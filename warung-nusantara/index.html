
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warung Nusantara</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle at top left, #ffffff, #eef1f7),
    linear-gradient(180deg,#f8f9fc,#e9edf5);
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:10px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(0,0,0,0.9);
  color:white;
  z-index:100;
  box-sizing:border-box;
}

.header-left{
  display:flex;
  align-items:center;
  gap:6px;
  font-weight:bold;
}

.header-center{
  flex:1;
  overflow:hidden;
  margin:0 10px;
  white-space:nowrap;
}

.header-center span{
  display:inline-block;
  animation:marquee 10s linear infinite;
  font-size:12px;
  text-transform:uppercase;
}

@keyframes marquee{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

.header-right{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}

/* BLINK */
.blink{animation:blink 1s infinite;}
@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:0;}
}

/* CONTENT */
.container{
  padding-top:70px;
  padding-bottom:150px;
}

.menu-grid{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:10px;
}

/* CARD */
.card{
  min-width:220px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 12px 30px rgba(0,0,0,0.12);
  transition:all 0.35s ease;
  border:1px solid rgba(255,255,255,0.5);
}

.card:hover{
  transform:translateY(-8px) scale(1.03);
  box-shadow:0 20px 40px rgba(0,0,0,0.18);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-body{padding:10px;}

.qty{
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}

.qty button{
  border:none;
  width:32px;
  height:32px;
  border-radius:50%;
  background:linear-gradient(145deg,#111,#333);
  color:white;
}

textarea{
  width:100%;
  margin-top:5px;
}

/* OPSI */
.opsi{
  background:linear-gradient(135deg,#fff3e0,#f1f1f1);
  margin:10px;
  padding:12px;
  border-radius:12px;
  border-left:5px solid orange;
}

/* NOTA */
.cart{
  background:#fff;
  border-top:3px dashed #000;
  padding:15px;
  font-family:'Courier New',monospace;
}

.cart::before{
  content:"";
  display:block;
  height:10px;
  background:repeating-linear-gradient(
    90deg,
    black 0px,
    black 2px,
    transparent 2px,
    transparent 6px
  );
  margin-bottom:10px;
}

.wa-btn{
  width:100%;
  padding:14px;
  background:linear-gradient(45deg,#25D366,#128C7E);
  border:none;
  color:white;
  border-radius:12px;
  margin-top:10px;
}

/* DESKTOP */
@media(min-width:768px){
  .layout{display:flex;}
  .menu{width:70%;}
  .cart{
    position:fixed;
    right:0;
    top:80px;
    width:30%;
    height:80vh;
    overflow:auto;
  }
}
/* ================= PROMO SECTION ================= */
.promo-section{
  margin:15px;
  padding:15px;
  border-radius:18px;
  background: linear-gradient(135deg, #fff6e5, #ffe0b2, #ffd180);
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.promo-title{
  font-weight:bold;
  margin-bottom:10px;
  font-size:16px;
}

/* CARD PROMO */
.card.promo{
  border:2px solid rgba(255,140,0,0.6);
  position:relative;
}

/* BADGE */
.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:linear-gradient(45deg,#ff3d00,#ff9100);
  color:white;
  font-size:11px;
  padding:4px 8px;
  border-radius:8px;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* TEXT KECIL */
.promo-note{
  font-size:11px;
  color:#444;
  margin-top:4px;
}

 .status{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
}

.dot{
  width:8px;
  height:8px;
  background:#00ff88;
  border-radius:50%;
  box-shadow:0 0 6px #00ff88;
  animation: pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1); opacity:1;}
  50%{transform:scale(1.4); opacity:0.5;}
  100%{transform:scale(1); opacity:1;}
}

@keyframes pulse{
  0%{transform:scale(1); opacity:1;}
  50%{transform:scale(1.4); opacity:0.6;}
  100%{transform:scale(1); opacity:1;}
} 


  /* ICON BUTTON */
.icon-btn{
  text-decoration:none;
  font-size:16px;
  background:rgba(255,255,255,0.1);
  padding:6px 10px;
  border-radius:8px;
  transition:0.2s;
  color:white;
}

.icon-btn svg{
  display:block;
}

/* efek hover glow */
.icon-btn:hover{
  background:rgba(255,255,255,0.25);
  transform:scale(1.1);
}
  

.icon-btn:hover{
  background:rgba(255,255,255,0.25);
}

/* MOBILE */
@media(max-width:600px){

  .header-left span{
    display:none;
  }

  .header-center{
    font-size:11px;
    text-align:center;
  }

}
  
.brand{
  display:flex;
  flex-direction:column;
  line-height:1.2;
}

.title{
  font-size:14px;
  font-weight:bold;
}

.status{
  display:flex;
  align-items:center;
  gap:5px;
  font-size:11px;
  opacity:0.9;
}
.icon-btn.wa{
  background:rgba(37,211,102,0.15);
}

</style>
</head>

<body>

<header>
<div class="header-left">

  <!-- LOGO -->
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
    <path d="M3 12h18M6 6h12M6 18h12" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </svg>

  <!-- NAMA + STATUS -->
  <div class="brand">
    <span class="title">Warung Nusantara</span>

    <span class="status">
      <span class="dot"></span>
      <span class="text">Buka 08.00 - 21.00</span>
    </span>
  </div>

</div>

  <!-- KANAN: AKSI -->
  <div class="header-right">

  <!-- MAP -->
<a href="https://maps.google.com" target="_blank" class="icon-btn" title="Lihat Lokasi">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
    <path d="M12 21s-6-5.33-6-10a6 6 0 1 1 12 0c0 4.67-6 10-6 10z" stroke="white" stroke-width="2"/>
    <circle cx="12" cy="11" r="2.5" stroke="white" stroke-width="2"/>
  </svg>
</a>

<a href="https://wa.me/6285331314118" target="_blank" class="icon-btn wa" title="Chat WhatsApp">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="#25D366">
    <path d="M20 3.5A11 11 0 0 0 3.5 20L2 22l2.6-1.4A11 11 0 1 0 20 3.5Z"/>
  </svg>
</a>

  </div>

</header>

<div class="container layout">
  <div class="menu" id="menu"></div>

  <div class="cart">

    <b>Data Pemesan</b><br><br>
    <input id="nama" placeholder="Nama Pemesan" style="width:100%;margin-bottom:5px;padding:6px;">
    <input id="alamat" placeholder="Alamat Pemesan" style="width:100%;margin-bottom:5px;padding:6px;">
    <input id="hp" placeholder="No Telp" style="width:100%;margin-bottom:5px;padding:6px;">

    <div id="cartList"></div>
    <div id="total" style="font-weight:bold;font-size:16px;margin-top:8px;"></div>
    
    <b>METODE PEMBAYARAN</b><br>
    <label><input type="radio" name="bayar" value="Cash"> Cash</label><br>
    <label><input type="radio" name="bayar" value="Transfer"> Transfer</label>

    <button class="wa-btn" onclick="sendWA()">Pesan via WhatsApp</button>

    <!-- FIX: dipindah dari CSS ke HTML -->
    <div style="margin-top:12px;padding:12px;border-radius:12px;background:#2c2c2c;color:#fff;font-size:13px;">
      <b>NO REKENING PEMBAYARAN:</b><br>
      BRI 31645643464616516516<br>
      MANDIRI 5616165134631564<br>
      BNI 5664564646464<br><br>
      <i>Note: Sertakan bukti transfer di WhatsApp setelah melakukan pemesanan</i>
    </div>

  </div>
</div>

<script>
const imgSample="https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg";

const data=[
{cat:"Makanan",name:"Nasi Goreng",price:15000,img:"https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg"},
{cat:"Makanan",name:"Sate",price:20000,img:"https://www.dapurkobe.co.id/wp-content/uploads/sate-ayam.jpg"},
{cat:"Makanan",name:"Bakso",price:12000,img:"https://asset.kompas.com/crops/cB-7HVfVN0Ci4yQKdoswSrFSJeU=/0x0:698x465/1200x800/data/photo/2021/01/08/5ff86f55cf2e4.jpg"},
{cat:"Makanan",name:"Mie Ayam",price:13000,img:"https://images.murianews.com/data/2025/10/menu-kuliner-indonesia-yang-terkenal-mie-ayam-tern-20251028124854.jpg"},
{cat:"Minuman",name:"Es Teh",price:5000,img:"https://suaramuda.net/wp-content/uploads/2024/12/911f22752088c421c5d35c60bd60896c.jpg"},
{cat:"Minuman",name:"Es Jeruk",price:7000,img:"https://nos.wjv-1.neo.id/tepi/item/9fdcef68-7414-4e03-b15b-d803e321a22d_original.webp"},
{cat:"Minuman",name:"Es Buah",price:10000,img:"https://image.idntimes.com/post/20240314/vecteezy-mixing-ice-fruit-on-the-medium-glass-with-red-sugar-the-2409981611-e19c76cf1b28908665001625bb727ae6-03b86e551f7287c74d36e06f751f11d2.jpg"},
{cat:"Minuman",name:"Kopi",price:6000,img:"https://images.tokopedia.net/img/HCoJbh/2025/1/2/963426c3-a299-4f05-8634-c0021f4483cb.jpg"},
{cat:"Camilan",name:"Tempe Goreng",price:3000,img:"https://www.dapurkobe.co.id/wp-content/uploads/tempe-goreng-kriuk-ala-tepung-kobe.jpg"},
{cat:"Camilan",name:"Tahu Goreng",price:3000,img:"https://imgx.sonora.id/crop/0x0:0x0/x/photo/2023/09/20/60f51eb86a674jpg-20230920033448.jpg"},
{cat:"Camilan",name:"Kerupuk",price:2000,img:"https://naturalfarm.sgp1.cdn.digitaloceanspaces.com/uploads/article/kalori-kerupuk-besaran-manfaat-risiko-dan-tips-sehat-mengonsumsinya-66-1711608699.jpg"},
{cat:"Camilan",name:"Kacang Goreng",price:4000,img:"https://asset.kompas.com/crops/MI2_fdUA-iLu6ArEoh8C_brpJhY=/128x85:1152x768/1200x800/data/photo/2021/04/23/60826e8d1d256.jpg"},
{cat:"Pedas",name:"Bakso Aci",price:15000,img:"https://assets-cloudflare.segari-ops.id/recipes/bakso-aci-lsbc31ynpSGbz.jpg"},
{cat:"Pedas",name:"Mie Pedas",price:12000,img:"https://i0.wp.com/resepkoki.id/wp-content/uploads/2020/03/Resep-Mie-Setan.jpg"},
{cat:"Pedas",name:"Seblak",price:13000,img:"https://i0.wp.com/zaloraadmin.wpcomstaging.com/wp-content/uploads/2024/03/bumbu-seblak-kuah.png"}
];

let cart={};

function renderMenu(){
let cats=[...new Set(data.map(d=>d.cat))];
let html="";
  
/* ===== PROMO SECTION (FIX CLEAN) ===== */
html += `
<div class="promo-section">
  <div class="promo-title">🔥 Menu Favorit Hari Ini</div>
  <div class="menu-grid">

    <div class="card promo">
      <div class="badge">🔥 HOT</div>
      <img src="https://www.dapurkobe.co.id/wp-content/uploads/nasi-goreng-kencur-kemangi.jpg">
      <div class="card-body">
        <b>Nasi Goreng</b><br>Rp15000

        <div class="qty">
          <button onclick="update(0,-1)">-</button>
          <span id="q0">${cart[0]?.qty||0}</span>
          <button onclick="update(0,1)">+</button>
        </div>

        <textarea id="n0" placeholder="catatan...">${cart[0]?.note||""}</textarea>

        <div class="promo-note">🔥 Banyak dipesan hari ini</div>
      </div>
    </div>

    <div class="card promo">
      <div class="badge">💥 PROMO</div>
      <img src="https://www.dapurkobe.co.id/wp-content/uploads/sate-ayam.jpg">
      <div class="card-body">
        <b>Sate</b><br>Rp20000

        <div class="qty">
          <button onclick="update(1,-1)">-</button>
          <span id="q1">${cart[1]?.qty||0}</span>
          <button onclick="update(1,1)">+</button>
        </div>

        <textarea id="n1" placeholder="catatan...">${cart[1]?.note||""}</textarea>

        <div class="promo-note">💥 Promo terbatas hari ini</div>
      </div>
    </div>

    <div class="card promo">
      <div class="badge">⭐ FAVORIT</div>
      <img src="https://asset.kompas.com/crops/cB-7HVfVN0Ci4yQKdoswSrFSJeU=/0x0:698x465/1200x800/data/photo/2021/01/08/5ff86f55cf2e4.jpg">
      <div class="card-body">
        <b>Bakso</b><br>Rp12000

        <div class="qty">
          <button onclick="update(2,-1)">-</button>
          <span id="q2">${cart[2]?.qty||0}</span>
          <button onclick="update(2,1)">+</button>
        </div>

        <textarea id="n2" placeholder="catatan...">${cart[2]?.note||""}</textarea>

        <div class="promo-note">⭐ Menu favorit pelanggan</div>
      </div>
    </div>

  </div>
</div>
`;

cats.forEach(cat=>{
html+=`<h3 style="padding-left:10px">${cat}</h3><div class="menu-grid">`;

data.forEach((item,i)=>{
if(item.cat===cat){
let qty=cart[i]?.qty||0;

html+=`
<div class="card">
<img src="${item.img}">
<div class="card-body">
<b>${item.name}</b><br>Rp${item.price}
<div class="qty">
<button onclick="update(${i},-1)">-</button>
<span id="q${i}">${qty}</span>
<button onclick="update(${i},1)">+</button>
</div>
<textarea id="n${i}" placeholder="catatan...">${cart[i]?.note||""}</textarea>
</div>
</div>`;
}
});

html+="</div>";
});

/* OPSI */
html+=`
<div class="opsi">
<b>OPSI PENGIRIMAN</b><br><br>

<label><input type="radio" name="kirim" value="Diantar" onclick="toggleKirim('antar')"> Diantar</label><br>
<label><input type="radio" name="kirim" value="COD" onclick="toggleKirim('cod')"> COD</label>

<div id="antarBox" style="display:none;margin-top:8px;">
<input id="alamatAntar" placeholder="Masukkan alamat lengkap" style="width:100%;padding:6px;">
</div>

<div id="codBox" style="display:none;margin-top:8px;">
<input id="lokasi" placeholder="Isikan lokasi titik ketemu" style="width:100%;padding:6px;">
</div>
</div>
`;

menu.innerHTML=html;
}

function toggleKirim(t){
antarBox.style.display="none";
codBox.style.display="none";
if(t==="antar") antarBox.style.display="block";
if(t==="cod") codBox.style.display="block";
}

function update(i,val){
let el=document.getElementById("q"+i);
let qty=parseInt(el.innerText)+val;
if(qty<0) qty=0;
el.innerText=qty;

if(qty===0) delete cart[i];
else cart[i]={...data[i],qty,note:document.getElementById("n"+i).value};

renderCart();
}

function renderCart(){
let html="";
let total=0;

Object.values(cart).forEach((c,i)=>{
let sub=c.price*c.qty;
total+=sub;

html+=`${i+1}. ${c.name} (${c.qty}x)<br>`;
if(c.note) html+=`- ${c.note}<br>`;
html+=`Rp${sub}<br><br>`;
});

cartList.innerHTML=html;

document.getElementById("total").innerHTML =
"<b>TOTAL: Rp" + total + "</b>";
}

function sendWA(){
let nama=nama.value.trim();
let alamat=alamat.value.trim();
let hp=hp.value.trim();

let text=`Halo, saya ${nama}\n${alamat}\n${hp}\n\nPesanan:\n`;

Object.values(cart).forEach(c=>{
text+=`${c.name} (${c.qty})\n`;
});

window.open("https://wa.me/6285331314118?text="+encodeURIComponent(text));
}

renderMenu();
</script>

</body>
</html>
